# Qwen2-7B 模型配置文件
# 基于 Qwen2 7B 架构

# TransformerConfig - 只包含 Megatron-Core 原生支持的模型架构参数
TransformerConfig:
  # ===== 基础模型架构 =====
  num_layers: 16
  hidden_size: 896
  ffn_hidden_size: 3072
  num_attention_heads: 8
  num_query_groups: 8

  # ===== 并行配置 =====
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1

  # ===== 基础配置 =====
  normalization: "RMSNorm"
  layernorm_epsilon: 0.000001
  attention_dropout: 0.0
  hidden_dropout: 0.0
  add_bias_linear: False               # 禁用线性层偏置
  init_method_std: 0.01

# 额外配置 - 不在 TransformerConfig 中的参数
extra_config:
  # ===== 序列和位置编码 =====
  seq_length: 1024
  position_embedding_type: "rope"
  max_position_embeddings: 1024
  rotary_base: 1000000
  use_rotary_position_embeddings: True

  # ===== 批次配置 =====
  micro_batch_size: 1
  global_batch_size: 8

  # ===== 优化器配置 =====
  lr: 1.25e-6
  min_lr: 1.25e-7
  weight_decay: 0.1
  clip_grad: 1.0
  lr_warmup_fraction: 0.01
  lr_decay_style: "cosine"
  lr_decay_iters: 1280
  train_iters: 2000
  adam_beta1: 0.9
  adam_beta2: 0.95
  initial_loss_scale: 4096

  # ===== Qwen2特有配置 =====
  padded_vocab_size: 151936
  use_distributed_optimizer: True
  use_fused_rmsnorm: True
  use_fused_rotary_pos_emb: True
  use_fused_swiglu: True
  use_flash_attn: True

# GPT层规格配置
get_gpt_layer_local_spec:
  num_experts: None                   # Qwen2不使用MoE
  moe_grouped_gemm: False
  qk_layernorm: False
  multi_latent_attention: False
  fp8: None
  moe_use_legacy_grouped_gemm: False
  normalization: "RMSNorm"
  qk_l2_norm: False

# 输入配置
input:
  shape: [32, 1, 896]               # 对应hidden_size
  dtype: torch.float32               # 统一使用float32
  device: "cuda"

# 注意力掩码配置
attention_mask: default
