# 组件级实验基础配置
experiment:
  seed: 42
  device: "npu"
  output_dir: "res/component_diff"
  num_iterations: 10

# 扰动配置（RQ2 蜕变测试）
perturbation:
  sigmas: [0.00001]
  distribution: "uniform"

# 组件输入形状配置
input_shapes:
  default: [32, 2, 1024]        # (seq_len, batch_size, hidden_size)
  embedding_input: [32, 2]       # (seq_len, batch_size) -> input_ids
  output_layer_input: [32, 2, 1024]  # (seq_len, batch_size, hidden_size)
  output_layer_output: [32, 2, 40000] # (seq_len, batch_size, vocab_size)

# 指标配置
metrics:
  eps: 1e-8
  compute_ulp: false

# 模型配置映射
model_configs:
  qwen2: "frame_diff_common/model_configs/qwen2.yaml"
  llama2: "frame_diff_common/model_configs/llama2.yaml"
  baichuan2: "frame_diff_common/model_configs/baichuan2.yaml"
  chatglm3: "frame_diff_common/model_configs/chatglm3.yaml"
  glm4: "frame_diff_common/model_configs/glm4.yaml"
  yi: "frame_diff_common/model_configs/yi.yaml"
  codellama: "frame_diff_common/model_configs/codellama.yaml"
  pangu: "frame_diff_common/model_configs/pangu.yaml"
  deepseekv3: "frame_diff_common/model_configs/deepseekv3.yaml"
  mixtral: "frame_diff_common/model_configs/mixtral.yaml"
  grok1: "frame_diff_common/model_configs/grok1.yaml"

# 组件编号映射
components:
  embedding_layer: 11
  self_attention_block: 12
  ffn_block: 13
  decoder_block: 14
  output_layer: 15
  moe_ffn_block: 16
  mla_self_attention_block: 17
