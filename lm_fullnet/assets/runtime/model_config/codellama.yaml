# CodeLLaMA-7B 模型配置文件
# 基于 CodeLLaMA 7B 架构

# TransformerConfig - 只包含 Megatron-Core 原生支持的模型架构参数
TransformerConfig:
  # ===== 基础模型架构 - 减小参数量以适应内存限制 =====
  num_layers: 4                      # 减少层数 (原32 -> 4)
  hidden_size: 1024                  # 减少隐藏维度 (原4096 -> 1024)
  ffn_hidden_size: 2048              # 减少FFN隐藏维度 (原11008 -> 2048)
  num_attention_heads: 8             # 减少注意力头数 (原32 -> 8)
  num_query_groups: 8                # 相应减少查询组数 (原32 -> 8)
  
  # ===== 并行配置 =====
  tensor_model_parallel_size: 1        # 简化为单卡测试
  pipeline_model_parallel_size: 1      # 简化为单卡测试
  # pipeline_dtype: torch.float16      # 单卡时不需要
  
  # ===== 基础配置 =====
  normalization: "RMSNorm"
  layernorm_epsilon: 0.00001
  attention_dropout: 0.0
  hidden_dropout: 0.0
  add_bias_linear: False               # 禁用线性层偏置
  init_method_std: 0.01

# 额外配置 - 不在 TransformerConfig 中的参数
extra_config:
  # ===== 序列和位置编码 - 减少序列长度 =====
  seq_length: 1024                   # 减少序列长度 (原4096 -> 1024)
  position_embedding_type: "rope"
  max_position_embeddings: 1024      # 相应减少最大位置编码 (原4096 -> 1024)
  rotary_base: 1000000
  
  # ===== 批次配置 =====
  micro_batch_size: 1
  global_batch_size: 32
  
  # ===== 优化器配置 =====
  lr: 1e-5
  min_lr: 1.0e-6
  weight_decay: 0.1
  clip_grad: 1.0
  lr_warmup_iters: 2
  lr_decay_style: "cosine"
  lr_decay_iters: 1280
  train_iters: 2000
  
  # ===== CodeLLaMA特有配置 =====
  vocab_size: 32016
  use_distributed_optimizer: True
  use_fused_rmsnorm: True
  use_fused_rotary_pos_emb: True
  use_fused_swiglu: True
  use_flash_attn: True

# GPT层规格配置
get_gpt_layer_local_spec:
  num_experts: None                   # CodeLLaMA不使用MoE
  moe_grouped_gemm: False
  qk_layernorm: False
  multi_latent_attention: False
  fp8: None
  moe_use_legacy_grouped_gemm: False
  normalization: "RMSNorm"
  qk_l2_norm: False

# 输入配置
input:
  shape: [4, 1, 1024]                # 对应hidden_size，减少batch_size
  dtype: torch.float32               # 统一使用float32
  device: "cuda"

# 注意力掩码配置
attention_mask: default
